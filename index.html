<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <!-- Google Font (matches your About page style) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .login-container {
      background: white;
      width: 360px;
      padding: 40px 35px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      animation: slideUp 0.8s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #764ba2;
      font-weight: 600;
    }

    .input-group {
      position: relative;
      margin-bottom: 22px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 45px 14px 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }

    .input-group input:focus {
      border-color: #667eea;
    }

    .input-group label {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      font-size: 13px;
      color: #999;
      pointer-events: none;
      transition: 0.3s;
      background: white;
      padding: 0 5px;
    }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: -8px;
      font-size: 12px;
      color: #667eea;
    }

    .eye-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      user-select: none;
    }

    .remember {
      display: flex;
      align-items: center;
      font-size: 13px;
      color: #555;
      margin-bottom: 15px;
    }

    .remember input {
      margin-right: 8px;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-login {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      margin-bottom: 12px;
    }

    .btn-login:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .btn-cancel {
      background: #f0f0f0;
      color: #444;
    }

    .btn-cancel:hover {
      background: #ddd;
    }

    #error-message {
      display: none;
      margin-top: 12px;
      text-align: center;
      color: red;
      font-size: 13px;
    }
  </style>

  <script>
    var correctUsername = "admin";
    var correctPassword = "1234";
    var visible = false;

    function checkLogin() {
      var u = document.getElementById("username").value;
      var p = document.getElementById("password").value;

      if (u === correctUsername && p === correctPassword) {
        window.location.href = "myportfolio.html";
      } else {
        document.getElementById("error-message").style.display = "block";
      }
    }

    function clearForm() {
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      document.getElementById("error-message").style.display = "none";
    }

    function togglePassword() {
      var pass = document.getElementById("password");
      var eye = document.getElementById("eye");

      if (!visible) {
        pass.type = "text";
        eye.textContent = "🙈";
        visible = true;
      } else {
        pass.type = "password";
        eye.textContent = "👁";
        visible = false;
      }
    }
  </script>
</head>

<body>

  <div class="login-container">
    <h2>Welcome Back</h2>

    <form onsubmit="checkLogin(); return false;">

      <div class="input-group">
        <input type="text" id="username" required placeholder=" ">
        <label>Username</label>
      </div>

      <div class="input-group">
        <input type="password" id="password" required placeholder=" ">
        <label>Password</label>
        <span class="eye-icon" id="eye" onclick="togglePassword()">👁</span>
      </div>

      <div class="remember">
        <input type="checkbox">
        <label>Remember Me</label>
      </div>

      <button type="submit" class="btn-login">Login</button>
      <button type="button" class="btn-cancel" onclick="clearForm()">Cancel</button>

      <div id="error-message">Invalid username or password</div>

    </form>
  </div>

</body>
</html>
